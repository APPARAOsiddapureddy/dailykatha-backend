# Runs when this repo (`dailykatha-backend` subtree) pushes to main — applies node-pg-migrate.
# Add repo secret DATABASE_URL (same Neon URI as Render Web Service).
name: Database migrations

on:
  push:
    branches: [main]

jobs:
  migrate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
      - run: npm ci
      - name: Run migrations
        run: npm run migrate:prod
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
