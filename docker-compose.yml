services:
  postgres:
    image: postgres:14
    environment:
      POSTGRES_DB: dailykatha
      POSTGRES_USER: dailykatha
      POSTGRES_PASSWORD: dailykatha
    ports:
      - "15432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dailykatha -d dailykatha"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "16379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

